.container{max-width:900px;margin:30px auto;background:#fff;padding:20px;border-radius:10px;box-shadow:0 2px 10px rgba(0,0,0,.1)}
h1,h2{text-align:center;margin:5px}
.info{display:flex;justify-content:space-between;flex-wrap:wrap;margin:15px 0;font-weight:bold}
table{width:100%;border-collapse:collapse}
th,td{border:1px solid #ddd;padding:10px;text-align:center}
th{background:#4CAF50;color:#fff}
input[type=number]{
width:80px;
padding:6px;
text-align:center;
box-sizing:border-box;
}
button{background:#4CAF50;color:#fff;border:none;padding:12px 25px;border-radius:6px;cursor:pointer;font-size:16px;margin-top:20px}

.status{margin-top:15px;font-weight:bold;color:green}
.search-box{
width:100%;
padding:12px 15px;
margin:15px 0;
font-size:16px;
border:1px solid #ccc;
border-radius:8px;

}

.search-box:focus{

border-color:#4CAF50;
box-shadow:0 0 5px rgba(76,175,80,.4);

.petugas-box{
margin:15px 0;
}

.petugas-box label{

margin-bottom:6px;

.petugas-input{
width:100%;

font-size:16px;
border:1px solid #ccc;

}

.petugas-input:focus{

.petugas-input.error{

let barang = kitchenBarang;

let sedangMenyimpan=false;

document.getElementById("tanggal").textContent=
new Date().toLocaleDateString("id-ID",{day:"2-digit",month:"long",year:"numeric"});

function renderBarang(){

    let html="";

    barang.forEach((item,index)=>{

        html+=`
        <tr class="barangRow"
            data-nama="${item.nama.toLowerCase()}">

            <td>${index+1}</td>

            <td>${item.nama}</td>

            <td>${item.satuan}</td>

            <td>
                <input
                type="number"
                id="qty${index}"
                value="0"
                min="0">
            </td>

            <td>
                <input
                type="text"
                id="harga${index}"
                value="Rp0"
                oninput="formatRupiah(this)">
            </td>

        </tr>
        `;

    });

    document.getElementById("barangList").innerHTML=html;

}

renderBarang();

// ================= SEARCH =================
document.getElementById("search").addEventListener("input",function(){

const keyword=this.value.toLowerCase().trim();

document.querySelectorAll(".barangRow").forEach(row=>{

const nama=row.dataset.nama;

row.style.display=nama.includes(keyword) ? "" : "none";

});

});

document.getElementById("search").focus();
// ==========================================

// Enter pindah ke input berikutnya
barang.forEach((_,i)=>{
const inp=document.getElementById("qty"+i);
inp.addEventListener("keydown",function(e){
if(e.key==="Enter"){
e.preventDefault();
if(i<barang.length-1){
document.getElementById("qty"+(i+1)).focus();
}else{
document.getElementById("btnSimpan").focus();
}
}
});
});

function simpan(){

if(sedangMenyimpan)return;

const petugasInput=document.getElementById("petugas");
const namaPetugas=petugasInput.value.trim();

if(namaPetugas===""){
petugasInput.classList.add("error");
petugasInput.focus();
alert("Nama petugas belum diisi.");
return;
}
petugasInput.classList.remove("error");

if(!confirm("Yakin ingin menyimpan data?")) return;

let data=[];

barang.forEach((item,index)=>{

let jumlah = parseInt(document.getElementById("qty"+index).value) || 0;
let harga = parseInt(
document.getElementById("harga"+index).value.replace(/[^0-9]/g,"")
) || 0;

if(jumlah > 0){

data.push({

    divisi: document.getElementById("divisi").value,

    petugas: namaPetugas,

    nama:item.nama,

    satuan:item.satuan,

    jumlah:jumlah,

    harga:harga

});

}

});

if(data.length===0){
    alert("Belum ada barang yang diinput.");
    return;
}

// TAMBAHKAN DUA BARIS INI
console.log("DIVISI :", document.getElementById("divisi").value);
console.log("DATA :", data);

sedangMenyimpan=true;

const btn=document.getElementById("btnSimpan");
btn.disabled=true;
btn.innerText="Menyimpan...";

fetch(URL_APPS_SCRIPT,{
method:"POST",
headers:{
"Content-Type":"text/plain;charset=utf-8"
},
body:JSON.stringify(data)
})
.then(r=>r.text())

.then(()=>{

barang.forEach((item,index)=>{
document.getElementById("qty"+index).value=0;
document.getElementById("harga"+index).value="Rp0";
});

const waktu=new Date().toLocaleString("id-ID");
document.getElementById("lastSave").innerHTML="Terakhir disimpan : "+waktu;
document.getElementById("status").innerHTML="✔ Data berhasil disimpan.";

// Kembali ke atas halaman
window.scrollTo({
  top: 0,
  behavior: "smooth"
});

})

.catch(()=>{
alert("Gagal menyimpan data.");
})
.finally(()=>{
sedangMenyimpan=false;
btn.disabled=false;
btn.innerText="Simpan ke Sheets";
});
}

function formatRupiah(input){

let angka = input.value.replace(/[^0-9]/g,"");

if(angka===""){
input.value="Rp0";
return;
}

input.value="Rp"+parseInt(angka).toLocaleString("id-ID");

}



function gantiDivisi(){

    const divisi =
    document.getElementById("divisi").value;

    if(divisi=="kitchen"){

        barang = kitchenBarang;

    }else{

        barang = bartenderBarang;

    }

    renderBarang();

}
